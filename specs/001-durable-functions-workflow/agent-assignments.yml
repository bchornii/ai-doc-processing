agents_scanned:
  - name: "Azure AI Engineer"
    source: "project"
    description: "Expert Azure AI engineer for the ai-doc-processing platform — covers Azure AI Document Intelligence, Azure AI Search (RAG pipelines), Azure AI Foundry agent orchestration, Semantic Kernel integration, and prompt design for production document processing workflows."
  - name: "Azure Infrastructure Engineer"
    source: "project"
    description: "Azure infrastructure specialist for the ai-doc-processing platform — authors Bicep modules, manages azd provisioning lifecycle, designs Azure resource topology, configures GitHub Actions CI/CD pipelines, and owns secrets management and RBAC for the document processing platform."
  - name: "Code Reviewer"
    source: "project"
    description: "Expert code reviewer who provides constructive, actionable feedback focused on correctness, maintainability, security, and performance — not style preferences."
  - name: "Cosmos DB Engineer"
    source: "project"
    description: "Azure Cosmos DB and storage specialist for the ai-doc-processing platform — owns partition key design, RU budget optimization, consistency model selection, container schema, Blob Storage access patterns, and Queue Storage integration for document ingestion workflows."
  - name: "Git Workflow Master"
    source: "project"
    description: "Expert in Git workflows, branching strategies, and version control best practices including conventional commits, rebasing, worktrees, and CI-friendly branch management."
  - name: "Minimal Change Engineer"
    source: "project"
    description: "Engineering specialist focused on minimum-viable diffs — fixes only what was asked, refuses scope creep, prefers three similar lines over a premature abstraction."
  - name: "Observability & SRE"
    source: "project"
    description: "Site reliability engineer for the ai-doc-processing platform — owns OpenTelemetry instrumentation, Application Insights configuration, SLO definitions, alert design, incident response, and post-mortem facilitation for Azure Functions and Durable Functions workloads."
  - name: "Solution Architect"
    source: "project"
    description: "Expert solution architect for .NET 10 / Azure platforms specializing in Clean Architecture, domain-driven design, distributed systems, and architectural decision records for the ai-doc-processing platform."
  - name: "Technical Writer"
    source: "project"
    description: "Expert technical writer specializing in developer documentation, API references, README files, and tutorials. Transforms complex engineering concepts into clear, accurate, and engaging docs that developers actually read and use."

